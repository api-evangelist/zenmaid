name: ZenMaid
kind: company
description: >-
  ZenMaid is scheduling and business-management software for maid and house
  cleaning services - booking, calendar/dispatch, automated SMS and email
  communication, GPS-verified clock-in/out on a cleaner mobile app, online
  payments and invoicing, payroll, and reporting. ZenMaid has no public,
  self-service developer portal, no published REST/GraphQL API reference, and
  no OpenAPI specification of its own. Its only documented programmatic
  surface is a Zapier integration (triggers - New Customer Created,
  Appointment Booked, Appointment Cancelled, Appointment Updated, Contact
  Created/Updated, One-Time Service Created/Updated, Recurring Service
  Created/Updated/Cancelled, Invoice Created, Invoice Paid; actions - Create
  Appointment, Create Booking, Create Cleaner, Create Customer) built and
  maintained by ZenMaid against a private, undocumented backend API. No API
  keys, base URL, endpoint reference, payload schema, or SDK are published for
  third-party developers; the public GitHub organization (github.com/zenmaid)
  has no public repositories. This entry is documented as a stub because
  there is no public API to catalog.
